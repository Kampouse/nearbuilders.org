## strfry config for NEAR Builders Nostr relay
## Docs: https://github.com/hoytech/strfry/blob/master/strfry.conf

db = "/app/strfry-db"

## DB backend: "lmdb" or "rocksdb"
dbBackend = "lmdb"

## Relay info (NIP-11)
relay = {
    name = "NEAR Builders Relay"
    description = "Nostr relay for NEAR Builders project comments and updates"
    pubkey = ""
    contact = "mailto:hello@nearbuilders.org"
    icon = "https://nearbuilders.org/logo.png"

    ## NIP-17: supported NIPs
    supportedNips = [1, 11, 12, 15, 16, 20, 22, 28, 33, 45]

    ## Version reported in NIP-11
    software = "strfry"
    version = "1.0.0"
}

## Relay limits
limits = {
    ## Max events stored
    maxEventSize = 65536

    ## Min POW difficulty (0 = no requirement)
    minPowDifficulty = 0

    ## Reject events older than this (seconds). 0 = no limit
    rejectEventsOlderThanSeconds = 0

    ## Reject events newer than this (seconds, from now). 0 = no limit
    rejectEventsNewerThanSeconds = 0

    ## Accepted event kinds. Empty = all
    ## We only need: 1 (text/comment), 7 (reaction), 30078 (parameterized replaceable)
    ## and 0 (metadata for attestations)
    acceptedKinds = [0, 1, 7, 30078]

    ## Filter requests per IP per second
    filterUpdateRatePerMinPerIp = 600

    ## Max subid length
    maxSubidLength = 256

    ## Max number of subscriptions per connection
    maxSubscriptionsPerConnection = 20

    ## Max limit parameter in FILTER requests
    maxFilterLimit = 1000

    ## How much time to wait before closing a subscription that has finished
    # closeSubscriptionsOnEose = false
}

## WebSocket settings
websocket = {
    ## Max message size in bytes
    maxMessageSize = 65536

    ## Ping interval (seconds)
    pingIntervalSeconds = 60
}

## Rate limiting
rateLimits = {
    ## Connection rate limit (per IP per minute)
    connectionRatePerMinute = 60

    /// Event write rate (per IP per minute)
    eventWriteRatePerMinute = 30
}

## HTTP server
http = {
    port = 7777
    bind = "0.0.0.0"

    ## Serve static files from this directory
    # staticDir = "./www"
}
